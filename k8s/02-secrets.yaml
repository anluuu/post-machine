# Langfuse API keys — run `make langfuse-keys` after deploying Langfuse to get real values.
# These defaults match the seed values in langfuse-values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-api
  namespace: posts-agent
type: Opaque
stringData:
  public-key: "pk-lf-local-posts-agent"
  secret-key: "sk-lf-local-posts-agent"
  host: "http://langfuse-web.langfuse.svc.cluster.local:3000"
